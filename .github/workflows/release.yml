name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create version PR or skip
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          commit: "Version packages"
          title: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

  tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      tags_pushed: ${{ steps.tags.outputs.tags_pushed }}
      publish_matrix: ${{ steps.tags.outputs.publish_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push release tags
        id: tags
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/create-release-tags.mjs

  trigger-publish:
    needs: tag
    if: needs.tag.outputs.tags_pushed == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.tag.outputs.publish_matrix) }}
    steps:
      - name: Dispatch publish workflow
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          set -euo pipefail
          echo "Dispatching ${{ matrix.workflow }} for package=${{ matrix.package }} ref=${{ matrix.ref }}"
          gh workflow run "${{ matrix.workflow }}" \
            --ref "${{ matrix.ref }}" \
            -f package="${{ matrix.package }}"
