name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create version PR or skip
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          commit: "Version packages"
          title: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

  tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      tags_pushed: ${{ steps.tags.outputs.tags_pushed }}
      publish_matrix: ${{ steps.tags.outputs.publish_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push release tags
        id: tags
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/create-release-tags.mjs

  trigger-publish:
    needs: tag
    if: needs.tag.outputs.tags_pushed == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.tag.outputs.publish_matrix) }}
    steps:
      # `gh workflow run` needs a git repo to resolve the remote; without
      # checkout it fails with "fatal: not a git repository".
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dispatch publish workflow
        env:
          # npm: GITHUB_TOKEN is enough (publish uses NPM_TOKEN).
          # jsr: dispatch as RELEASE_PAT owner (a @meshql scope member).
          # github-actions[bot] hits JSR actorNotScopeMember when the scope
          # requires the triggering user to be a member (default).
          WORKFLOW: ${{ matrix.workflow }}
          PACKAGE: ${{ matrix.package }}
          REF_TAG: ${{ matrix.ref }}
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Dispatch against main (workflow_dispatch needs a branch ref that
          # contains the workflow file). Package versions already live on
          # main after the Version Packages merge; tag refs are for audit.
          if [ "${WORKFLOW}" = "publish-jsr.yml" ]; then
            if [ -z "${RELEASE_PAT}" ]; then
              echo "::error::RELEASE_PAT is required to dispatch Publish JSR (must be a @meshql JSR scope member)."
              exit 1
            fi
            export GH_TOKEN="${RELEASE_PAT}"
          else
            export GH_TOKEN="${GITHUB_TOKEN}"
          fi

          echo "Dispatching ${WORKFLOW} for package=${PACKAGE} (tag ${REF_TAG}) as $(gh api user --jq .login)"
          if [ "${WORKFLOW}" = "publish-npm.yml" ]; then
            gh workflow run "${WORKFLOW}" \
              --ref main \
              -f package="${PACKAGE}" \
              -f publish_registry=true
          else
            gh workflow run "${WORKFLOW}" \
              --ref main \
              -f package="${PACKAGE}"
          fi
