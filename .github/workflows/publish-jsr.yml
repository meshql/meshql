name: Publish JSR

on:
  push:
    tags:
      - "core/v*"
      - "postgres/v*"
      - "sqlite/v*"
      - "prisma/v*"
      - "drizzle/v*"
      - "kysely/v*"
      - "http/v*"
      - "upload/v*"
      - "client/v*"
      - "integrity/v*"
      - "access/v*"
      - "access-cache/v*"
      - "persisted-queries/v*"
      - "pubsub/v*"
      - "sse/v*"
      - "codemods/v*"
      - "gateway/v*"
      - "security/v*"
      - "all/v*"
      - "v*" # legacy umbrella tag: publish every package
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        default: all
        options:
          - all
          - core
          - postgres
          - sqlite
          - prisma
          - drizzle
          - kysely
          - http
          - upload
          - client
          - integrity
          - access
          - access-cache
          - persisted-queries
          - pubsub
          - sse
          - codemods
          - gateway
          - security

# Each package must be created on JSR and linked to meshql/meshql in package settings.
# See CONTRIBUTING.md → Publishing to JSR

permissions:
  contents: read
  id-token: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.plan.outputs.packages }}
      tag_version: ${{ steps.plan.outputs.tag_version }}
    steps:
      - name: Resolve packages to publish
        id: plan
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            selection="${{ inputs.package }}"
            tag_version=""
          else
            tag="${GITHUB_REF#refs/tags/}"
            # Per-package tags (core/v1.2.3) carry a version; milestone tags (v0.8.0)
            # and legacy umbrella tags (all/v*) do not — skip manifest version check.
            tag_version=""
            if [[ "$tag" == */v* ]]; then
              tag_version="${tag#*/v}"
            fi

            case "$tag" in
              core/v*) selection="core" ;;
              postgres/v*) selection="postgres" ;;
              sqlite/v*) selection="sqlite" ;;
              prisma/v*) selection="prisma" ;;
              drizzle/v*) selection="drizzle" ;;
              kysely/v*) selection="kysely" ;;
              http/v*) selection="http" ;;
              upload/v*) selection="upload" ;;
              client/v*) selection="client" ;;
              integrity/v*) selection="integrity" ;;
              access/v*) selection="access" ;;
              access-cache/v*) selection="access-cache" ;;
              persisted-queries/v*) selection="persisted-queries" ;;
              pubsub/v*) selection="pubsub" ;;
              sse/v*) selection="sse" ;;
              codemods/v*) selection="codemods" ;;
              gateway/v*) selection="gateway" ;;
              security/v*) selection="security" ;;
              all/v*|v*) selection="all" ;;
              *)
                echo "::error::Unknown tag format: $tag"
                exit 1
                ;;
            esac
          fi

          case "$selection" in
            all)
              if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                packages='["core","postgres","sqlite","prisma","drizzle","kysely","http","upload","client","integrity","access","access-cache","persisted-queries","pubsub","sse","codemods","gateway"]'
              else
                packages='["core","postgres","sqlite","prisma","drizzle","kysely","http","upload","client"]'
              fi
              ;;
            security) packages='["integrity","access"]' ;;
            core|postgres|sqlite|prisma|drizzle|kysely|http|upload|client|integrity|access|access-cache|persisted-queries|pubsub|sse|codemods|gateway)
              packages="[\"$selection\"]"
              ;;
            *)
              echo "::error::Unknown package selection: $selection"
              exit 1
              ;;
          esac

          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "tag_version=$tag_version" >> "$GITHUB_OUTPUT"
          echo "Publishing: $packages"

  publish:
    needs: resolve
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify JSR manifests and registry setup
        env:
          TAG_VERSION: ${{ needs.resolve.outputs.tag_version }}
          PACKAGES: ${{ needs.resolve.outputs.packages }}
        run: |
          set -euo pipefail
          node scripts/verify-jsr-publish.mjs \
            $(node -e 'JSON.parse(process.env.PACKAGES).forEach((p) => console.log(p))')

      - name: Publish selected packages
        env:
          PACKAGES: ${{ needs.resolve.outputs.packages }}
        run: |
          set -euo pipefail
          for pkg in $(node -e 'JSON.parse(process.env.PACKAGES).forEach((p) => console.log(p))'); do
            echo "Publishing @meshql/${pkg}..."
            node scripts/prepare-jsr-publish.mjs "${pkg}"
            log="/tmp/jsr-publish-${pkg}.log"
            if ! (cd "packages/${pkg}" && npx jsr publish --allow-dirty 2>&1 | tee "${log}"); then
              echo "::group::JSR publish output for ${pkg}"
              cat "${log}"
              echo "::endgroup::"
              if grep -q "don't exist" "${log}"; then
                short_name="$(node -pe "JSON.parse(require('node:fs').readFileSync('packages/${pkg}/jsr.json','utf8')).name.replace('@meshql/','')")"
                echo "::error::JSR package @meshql/${short_name} is not registered. Create it at https://jsr.io/new?scope=meshql&package=${short_name} and link meshql/meshql in Settings."
              fi
              exit 1
            fi
          done
