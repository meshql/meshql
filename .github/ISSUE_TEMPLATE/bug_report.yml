name: Bug report
description: Report something that isn't working as expected
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I call createMesh with ..., I expected ... but got ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or commands to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@meshql/core"
        - "@meshql/http"
        - "@meshql/client"
        - "@meshql/upload"
        - "example / other"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 0.1.0 or main @ commit sha
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Node 24, pnpm 11, macOS / Linux / Windows
    validations:
      required: true
